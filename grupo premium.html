<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Exclusivo - Club Privado 🔞</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #2d0b0b);
            color: white;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2rem;
            color: #ff3366;
        }

        .content-preview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .content-item {
            position: relative;
            height: 250px;
            overflow: hidden;
            border-radius: 10px;
        }

        .content-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s;
        }

        .content-item:hover .overlay {
            opacity: 1;
        }

        .share-button {
            margin-top: 30px;
            padding: 15px;
            background: #ff3366;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container">

<header>
    <div class="logo">Club Privado 🔞</div>
    <p>Acceso exclusivo</p>
</header>

<section class="content-preview">
    <div class="content-item">
        <img src="https://picsum.photos/300/400?1">
        <div class="overlay">▶️ Video 1</div>
    </div>

    <div class="content-item">
        <img src="https://picsum.photos/300/400?2">
        <div class="overlay">▶️ Video 2</div>
    </div>

    <div class="content-item">
        <img src="https://picsum.photos/300/400?3">
        <div class="overlay">▶️ Video 3</div>
    </div>
</section>

<button class="share-button" onclick="share()">Compartir para desbloquear</button>

<div class="footer">
    © 2026 Club Privado
</div>

</div>

<script>
function share() {
    alert("Función de compartir simulada 🚀");
}
</script>

</body>
</html>
