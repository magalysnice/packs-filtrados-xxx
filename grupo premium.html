        .logo {

        }

        .warning {

            padding: 10px;

            margin-bottom: 20px;

            border-radius: 10px;
            overflow: hidden;
            height: 250px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }
        
        .content-item:hover {
            transform: scale(1.05);
        }
        
        .content-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .content-item:hover .overlay {
            opacity: 1;
        }
        
        .play-icon {
            font-size: 3rem;
            color: #ff3366;

        }

        }
        
        .premium-steps {
            display: flex;

            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .step {
            flex: 1;

            padding: 15px;
            margin: 10px;
            background: rgba(255, 51, 102, 0.1);
            border-radius: 10px;
            border: 1px solid #ff3366;
        }
        
        .step-number {
            font-size: 2rem;
            color: #ff3366;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .step-text {
            font-size: 1rem;
        }
        
        .share-button {
            background: linear-gradient(90deg, #ff3366, #ff6699);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-bottom: 20px;
        }
        
        .share-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 51, 102, 0.5);
        }
        
        .verification-input {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .verification-input input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ff3366;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            width: 300px;
            margin-right: 10px;
        }
        
        .verification-input button {
            background: #ff3366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            padding: 20px 0;
            color: #999;
            font-size: 0.9rem;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            text-align: center;
            border: 1px solid #ff3366;
        }
        
        .close-modal {
            float: right;
            font-size: 2rem;
            color: #ff3366;
            cursor: pointer;
        }
        
        .success-message {
            color: #4CAF50;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        
        .error-message {
            color: #ff3366;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .countdown {
            font-size: 2rem;
            color: #ff3366;
            margin: 20px 0;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 5px solid #ff3366;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
