<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Exclusiva</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2d0b0b);
    color: white;
    margin: 0;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

header {
    text-align: center;
    margin-bottom: 30px;
}

.logo {
    font-size: 2rem;
    color: #ff3366;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.item {
    position: relative;
    height: 250px;
    border-radius: 10px;
    overflow: hidden;
}

.item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: 0.3s;
}

.item:hover .overlay {
    opacity: 1;
}

.whatsapp {
    margin-top: 25px;
    padding: 15px;
    background: #25D366;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    width: 100%;
    font-size: 1rem;
}

.footer {
    margin-top: 40px;
    text-align: center;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">

<header>
    <div class="logo">Galería Premium</div>
    <p>Fotos estilo moda y lifestyle</p>
</header>

<div class="grid">

    <div class="item">
        <img src="https://source.unsplash.com/300x400/?woman,latina,portrait">
        <div class="overlay">Ver</div>
    </div>

    <div class="item">
        <img src="https://source.unsplash.com/300x400/?woman,model,fashion">
        <div class="overlay">Ver</div>
    </div>

    <div class="item">
        <img src="https://source.unsplash.com/300x400/?girl,smile,portrait">
        <div class="overlay">Ver</div>
    </div>

    <div class="item">
        <img src="https://source.unsplash.com/300x400/?woman,beauty,style">
        <div class="overlay">Ver</div>
    </div>

    <div class="item">
        <img src="https://source.unsplash.com/300x400/?latina,model,outdoor">
        <div class="overlay">Ver</div>
    </div>

    <div class="item">
        <img src="https://source.unsplash.com/300x400/?woman,portrait,city">
        <div class="overlay">Ver</div>
    </div>

</div>

<button class="whatsapp" onclick="compartirWhatsApp()">📲 Compartir en WhatsApp</button>

<div class="footer">© 2026 Galería</div>

</div>

<script>
function compartirWhatsApp() {
    const mensaje = "Mira esta galería 📸 " + window.location.href;
    const url = "https://wa.me/?text=" + encodeURIComponent(mensaje);
    window.open(url, "_blank");
}
</script>

</body>
</html>
