<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Privado 🔞</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2d0b0b);
    color: white;
    margin: 0;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

header {
    text-align: center;
    margin-bottom: 30px;
}

.logo {
    font-size: 2rem;
    color: #ff3366;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.item {
    position: relative;
    height: 250px;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.item img,
.item video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: 0.3s;
}

.item:hover .overlay {
    opacity: 1;
}

button {
    margin-top: 20px;
    padding: 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
}

/* botones */
.whatsapp {
    background: #25D366;
    color: white;
}

.add-btn {
    background: #ff3366;
    color: white;
}

.footer {
    margin-top: 40px;
    text-align: center;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">

<header>
    <div class="logo">Club Privado 🔞</div>
    <p>Contenido exclusivo</p>
</header>

<!-- CONTENIDO -->
<div class="grid" id="content">

    <!-- EJEMPLO IMAGEN -->
    <div class="item">
        <img src="https://picsum.photos/300/400?1">
        <div class="overlay">Imagen</div>
    </div>

    <!-- EJEMPLO VIDEO -->
    <div class="item">
        <video src="https://www.w3schools.com/html/mov_bbb.mp4" muted></video>
        <div class="overlay">Video</div>
    </div>

</div>

<!-- BOTONES -->
<button class="add-btn" onclick="agregarContenido()">➕ Agregar imagen/video</button>
<button class="whatsapp" onclick="compartirWhatsApp()">📲 Compartir en WhatsApp</button>

<div class="footer">© 2026</div>

</div>

<script>
function agregarContenido() {
    const tipo = prompt("Escribe: imagen o video");

    if (!tipo) return;

    const url = prompt("Pega la URL del contenido:");

    if (!url) return;

    const contenedor = document.getElementById("content");
    const div = document.createElement("div");
    div.className = "item";

    if (tipo.toLowerCase() === "imagen") {
        div.innerHTML = `
            <img src="${url}">
            <div class="overlay">Imagen</div>
        `;
    } else if (tipo.toLowerCase() === "video") {
        div.innerHTML = `
            <video src="${url}" muted></video>
            <div class="overlay">Video</div>
        `;
    } else {
        alert("Tipo no válido");
        return;
    }

    contenedor.appendChild(div);
}

function compartirWhatsApp() {
    const mensaje = "Mira este contenido 🔥 " + window.location.href;
    const url = "https://wa.me/?text=" + encodeURIComponent(mensaje);
    window.open(url, "_blank");
}
</script>

</body>
</html>
