<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2d0b0b);
    color: white;
    margin: 0;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

header {
    text-align: center;

}

.logo {
    font-size: 2rem;
    color: #ff3366;
}

.ad {
    text-align: center;
    margin: 20px 0;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.item {
    position: relative;
    height: 250px;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: 0.3s;
    text-align: center;
    padding: 10px;
}

.item:hover .overlay {
    opacity: 1;
}

.title {
    font-size: 1.1rem;
    color: #ff3366;
}

.footer {
    margin-top: 40px;
    text-align: center;
    color: #aaa;
}
</style>

<script>
// Compartir WhatsApp
function compartirWhatsApp() {
    const mensaje = "🔥 Comparte para acceder 😈 👉 " + window.location.href;
    const url = "https://api.whatsapp.com/send?text=" + encodeURIComponent(mensaje);
    window.open(url, "_blank");
}

// Click en imágenes

];

function cambiarImagenes() {
    document.querySelectorAll(".item img").forEach(img => {
        img.src = imagenes[Math.floor(Math.random() * imagenes.length)];
    });
}

setInterval(cambiarImagenes, 5000);
