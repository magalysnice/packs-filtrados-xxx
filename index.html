<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Premium</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2d0b0b);
    color: white;
    margin: 0;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

header {
    text-align: center;
    margin-bottom: 30px;
}

.logo {
    font-size: 2rem;
    color: #ff3366;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.item {
    position: relative;
    height: 250px;
    border-radius: 10px;
    overflow: hidden;
}

.item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: 0.3s;
    text-align: center;
    padding: 10px;
}

.item:hover .overlay {
    opacity: 1;
}

.title {
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 5px;
    color: #ff3366;
}

.description {
    font-size: 0.9rem;
    color: #ddd;
}

.whatsapp {
    margin-top: 25px;
    padding: 15px;
    background: #25D366;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    width: 100%;
    font-size: 1rem;
}

.footer {
    margin-top: 40px;
    text-align: center;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">

<header>
    <div class="logo">Galería Premium</div>
    <p>Comparte en WhatsApp para unirte al grupo privado</p>
</header>

<div class="grid">

    <div class="item">
        <img src="https://gruposycanales.website/wp-content/uploads/2026/04/HHFczcxbsAAqTgr.jpg">
        <div class="overlay">
            <div class="title">Your new obsession</div>
            <div class="description">Retrato natural con estilo moderno.</div>
        </div>
    </div>

    <div class="item">
        <img src="https://gruposycanales.website/wp-content/uploads/2026/04/HHFKBQfa0AALGdx.jpg">
        <div class="overlay">
            <div class="title">Moda Urbana</div>
            <div class="description">😉🦋</div>
        </div>
    </div>

    <div class="item">
        <img src="https://gruposycanales.website/wp-content/uploads/2026/04/HG7oEdIbUAAsyOK.jpg">
        <div class="overlay">
            <div class="title">Sonrisa Natural</div>
            <div class="description">Urge playa 🌊</div>
        </div>
    </div>

    <div class="item">
        <img src="https://gruposycanales.website/wp-content/uploads/2026/04/HHIHpVebAAAZ6hk.jpg">
        <div class="overlay">
            <div class="title">Belleza Clásica</div>
            <div class="description">Lash time😉</div>
        </div>
    </div>

    <div class="item">
        <img src="https://gruposycanales.website/wp-content/uploads/2026/04/HHE5a9OaIAAOIG4.jpg">
        <div class="overlay">
            <div class="title">Aire Libre</div>
            <div class="description">Amo el gym</div>
        </div>
    </div>

    <div class="item">
        <img src="https://gruposycanales.website/wp-content/uploads/2026/04/HHLHNmxWoAAZzLO.jpg">
        <div class="overlay">
            <div class="title">Estilo Urbano</div>
            <div class="description">Wataa</div>
        </div>
    </div>

</div>

<button class="whatsapp" onclick="compartirWhatsApp()">📲 Compartir en WhatsApp</button>

<div class="footer">© 2026 Galería</div>

</div>

<script>
function compartirWhatsApp() {
    const mensaje = "Mira esta galería 📸 " + window.location.href;
    const url = "https://wa.me/?text=" + encodeURIComponent(mensaje);
    window.open(url, "_blank");
}
</script>

</body>
</html>
