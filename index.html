.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

.item {
    position: relative;
    height: 250px;
    border-radius: 10px;
    overflow: hidden;

.item img {

    height: 100%;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: 0.3s;
    text-align: center;
    padding: 10px;
}

.item:hover .overlay {
    opacity: 1;
}

.title {
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 5px;
    color: #ff3366;
}

.description {

    background: #25D366;

    border-radius: 10px;

    cursor: pointer;
    width: 100%;

}

.footer {

</style>

function cambiarImagenes() {
    document.querySelectorAll(".item img").forEach(img => {
        const random = imagenes[Math.floor(Math.random() * imagenes.length)];
        img.src = random + "?t=" + Date.now();
    });
}

function mezclarGrid() {
    const grid = document.querySelector(".grid");
    const items = Array.from(grid.children);
    items.sort(() => Math.random() - 0.5);
    items.forEach(el => grid.appendChild(el));
}

setInterval(() => {
    cambiarImagenes();
    mezclarGrid();
}, 6000);
